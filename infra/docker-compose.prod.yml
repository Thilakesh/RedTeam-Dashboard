services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: recon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:${POSTGRES_PASSWORD}@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /secrets/jwt/private.pem
      JWT_PUBLIC_KEY_PATH: /secrets/jwt/public.pem
      JWT_ACCESS_EXPIRE_MINUTES: "10"
      JWT_REFRESH_EXPIRE_DAYS: "14"
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: thilakesh.in
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SUPER_ADMIN_EMAIL: ${ADMIN_EMAIL}
      CORS_ORIGINS: '["https://recon.thilakesh.in"]'
      CORS_ORIGIN_REGEX: ""
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://recon-media.thilakesh.in
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: recon
      MINIO_USE_SIGNED_URLS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - jwt_secrets:/secrets/jwt
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:${POSTGRES_PASSWORD}@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      PDCP_API_KEY: ${PDCP_API_KEY:-}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://recon-media.thilakesh.in
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: recon
      MINIO_USE_SIGNED_URLS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  heavy-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.heavy-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:${POSTGRES_PASSWORD}@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      PDCP_API_KEY: ${PDCP_API_KEY:-}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://recon-media.thilakesh.in
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: recon
      MINIO_USE_SIGNED_URLS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ARQ_QUEUE_NAME: heavy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  investigation-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.investigation_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:${POSTGRES_PASSWORD}@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://recon-api.thilakesh.in
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  jwt_secrets:
  caddy_data:
  caddy_config:
