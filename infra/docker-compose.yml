services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: recon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      # minio/minio image has no curl; use bash /dev/tcp which is always available.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /secrets/jwt/private.pem
      JWT_PUBLIC_KEY_PATH: /secrets/jwt/public.pem
      JWT_ACCESS_EXPIRE_MINUTES: "10"
      JWT_REFRESH_EXPIRE_DAYS: "14"
      COOKIE_SECURE: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-alpha@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Testing123@}
      CORS_ORIGINS: '["http://localhost:3000"]'
      PLATFORM_BLOCKED_DOMAINS: thilakesh.in
      # Needed so the API can build download URLs for MinIO-offloaded tool
      # output (Operation/InvestigationTask stdout+stderr) — see storage.object_url().
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: recon
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../backend:/app
      - jwt_secrets:/secrets/jwt

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      # ProjectDiscovery Cloud Platform key — used by asnmap (and any future PD tool
      # that gates behind PDCP). Move to a non-checked-in env file before deploying.
      PDCP_API_KEY: ${PDCP_API_KEY:-}
      MINIO_URL: http://minio:9000
      # Browser-accessible URL — used by storage.public_url() so screenshot links
      # work from the browser.  minio:9000 is only resolvable inside Docker.
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: recon
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PLATFORM_BLOCKED_DOMAINS: thilakesh.in
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app

  heavy-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.heavy-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      PDCP_API_KEY: ${PDCP_API_KEY:-}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: recon
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ARQ_QUEUE_NAME: heavy
      PLATFORM_BLOCKED_DOMAINS: thilakesh.in
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped

  investigation-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.investigation_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/recon
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: recon
      PLATFORM_BLOCKED_DOMAINS: thilakesh.in
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev"

  # --- Observability stack (dev mirror of docker-compose.prod.yml) ----------

  node-exporter:
    image: prom/node-exporter:v1.8.2

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://recon:recon@postgres:5432/recon?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - node-exporter
      - postgres-exporter
      - redis-exporter

  loki:
    image: grafana/loki:3.3.0
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml

  alloy:
    image: grafana/alloy:v1.5.1
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # No real endpoint in dev — Grafana loads fine with this, the webhook
      # contact point just has nowhere to actually deliver to. Override this
      # var before testing alert delivery locally.
      GRAFANA_ALERT_WEBHOOK_URL: "http://localhost/unconfigured-alert-webhook"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3300:3000"
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  minio_data:
  jwt_secrets:
  prometheus_data:
  loki_data:
  grafana_data:
